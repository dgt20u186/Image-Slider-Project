<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Slider Project</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="slider" role="region" aria-label="Слайд-шоу">
        <!-- Слайды -->
        <div class="slides-wrapper">
            <div class="slide fade active">
                <img src="https://images.unsplash.com/photo-1466854076813-4aa9ac0fc347?ixlib=rb-1.2.1&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1632&q=80" alt="Image 1" />
            </div>
            <div class="slide fade">
                <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?ixlib=rb-1.2.1&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1474&q=80" alt="Image 2" />
            </div>
            <div class="slide fade">
                <img src="https://images.unsplash.com/photo-1475924156734-496f6cac6ec1?ixlib=rb-1.2.1&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1470&q=80" alt="Image 3" />
            </div>
        </div>

        <!-- Кнопки управления -->
        <button class="btn prev" aria-label="Previous Image">&#10094;</button>
        <button class="btn next" aria-label="Next Image">&#10095;</button>

        <!-- Индикаторы (точки) -->
        <div class="dots-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
